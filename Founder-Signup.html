<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Contact Us - Atlas Church Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Atlas Church Solutions" />
    <link rel="manifest" href="/site.webmanifest" />
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --accent-green: #5CE1A5;
            --text-light: #EEF9F3;
            --text-muted: #6B7280;
            --font-main: 'Poppins', sans-serif;
            --font-sub: 'Source Sans 3', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        /* --- APP-LIKE SCROLL LOCK (Desktop Only) --- */
        html, body {
            height: 100%;
            overflow: hidden; 
            width: 100%;
            max-width: 100vw;
            position: relative;
        }

        body {
            background: linear-gradient(150.34deg, rgba(13, 31, 26, 0.5) 0%, rgba(12, 21, 16, 0.5) 100%), #000000;
            color: var(--text-light);
            font-family: var(--font-sub); 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, h5, h6 { font-family: var(--font-main); }

        /* --- NAVIGATION --- */
        nav { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 30px 5%; width: 100%; max-width: 1400px; margin: 0 auto; position: relative; z-index: 100; }
        
        .header-left { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .header-left img { width: 40px; height: auto; transition: width 0.2s; }
        .header-text { display: flex; flex-direction: column; }
        .header-text h1 { font-size: 28px; line-height: 1; color: #fff; font-weight: 800; letter-spacing: -0.5px; transition: font-size 0.2s; }
        .header-text span { font-size: 10px; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; font-weight: 600; transition: font-size 0.2s;}
        
        .header-center { display: flex; gap: 32px; align-items: center; }
        .header-center a { color: #D1D5DB; text-decoration: none; font-size: 14px; font-family: var(--font-main); font-weight: 600; transition: color 0.2s, font-size 0.2s; }
        .header-center a:hover { color: var(--accent-green); }

        .header-right { display: flex; justify-content: flex-end; align-items: center; }
        .btn-login { background-color: var(--accent-green); color: #0F1112; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-family: var(--font-main); font-weight: 700; font-size: 15px; transition: all 0.3s ease; white-space: nowrap;}
        .btn-login:hover { opacity: 0.8; }

        /* --- BACKGROUND GLOWS --- */
        .bg-glow-top { position: absolute; top: -80px; right: -80px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(52, 211, 153, 0.08) 0%, transparent 70%); border-radius: 50%; z-index: -1; }
        .bg-glow-bottom { position: absolute; bottom: 40px; left: -40px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(52, 211, 153, 0.05) 0%, transparent 70%); border-radius: 50%; z-index: -1; }

        /* --- SCROLLABLE MAIN CONTAINER --- */
        /* This allows the page to scroll while keeping the app-like body lock */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* --- HERO & FORM STYLES --- */
        .contact-us-hero { text-align: center; padding: 60px 20px 40px; max-width: 800px; margin: 0 auto; }
        .contact-us-eyebrow { color: var(--accent-green); font-family: var(--font-main); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 20px; }
        .contact-us-hero h1 { font-size: 48px; line-height: 1.2; margin-bottom: 20px; letter-spacing: -1px; }
        .contact-us-hero h1 span { color: var(--accent-green); }
        .contact-us-hero p { font-family: var(--font-sub); color: var(--text-muted); font-size: 16px; line-height: 1.7; font-weight: 400; max-width: 500px; margin: 0 auto; }

        .form-container { max-width: 700px; margin: 0 auto 80px; width: 100%; padding: 0 20px; }
        .atlas-form { background-color: rgba(15, 17, 18, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 16px; display: flex; flex-direction: column; gap: 24px; backdrop-filter: blur(10px); }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-family: var(--font-main); font-size: 13px; font-weight: 600; color: #D1D5DB; letter-spacing: 0.5px; }
        
        .form-group input, .form-group textarea {
            background-color: #000;
            border: 1px solid #2A2E33;
            padding: 16px;
            border-radius: 8px;
            color: var(--text-light);
            font-family: var(--font-sub);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .form-group input::placeholder, .form-group textarea::placeholder { color: #4B5563; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent-green); box-shadow: 0 0 0 1px var(--accent-green); }
        .form-group textarea { resize: vertical; min-height: 140px; }

        .btn-submit {
            background-color: var(--accent-green);
            color: #0F1112;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-submit:hover { opacity: 0.8; transform: translateY(-1px); }

        /* --- FOOTER --- */
        .footer { background: transparent; padding: 30px 40px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-muted); font-family: 'Arial', sans-serif; margin-top: auto; }
        .footer-links { display: flex; gap: 30px; }
        .footer-links a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
        .footer-links a:hover { color: var(--text-light); }

        /* ========================================================
           MOBILE RESPONSIVENESS
           ======================================================== */
        @media (max-width: 900px) {
            html, body { height: auto; overflow: visible; overflow-x: clip; }
            .scrollable-content { overflow: visible; padding-top: 70px; } /* Prevent overlap with fixed nav */

            nav { position: fixed; top: 0; left: 0; height: 70px; background: #000; border-bottom: 1px solid #1A1A1A; padding: 0 5%; gap: 6px; }
            .header-left { gap: 6px; }
            .header-left img { width: 28px; }
            .header-text h1 { font-size: 18px; letter-spacing: 0;}
            .header-text span { font-size: 7px; margin-top: 0px; letter-spacing: 1px;}
            .header-center { display: none; } 
            .btn-login { padding: 6px 12px; font-size: 12px; }

            .contact-us-hero { padding: 40px 20px 30px; }
            .contact-us-hero h1 { font-size: 36px; }
            .atlas-form { padding: 30px 20px; }

            .footer { flex-direction: column; gap: 20px; text-align: center; }
            .footer-links { flex-wrap: wrap; justify-content: center; }
        }

    </style>
</head>
<body>

    <div class="bg-glow-top"></div>
    <div class="bg-glow-bottom"></div>

    <nav>
        <a href="index.html" class="header-left">
            <img src="image_2.png" alt="Atlas Logo">
            <div class="header-text">
                <h1>Atlas</h1>
                <span>Church Solutions</span>
            </div>
        </a>
        <div class="header-center">
            <a href="pricing.html">Pricing</a>
            <a href="about.html">About</a>
            <a href="legal.html">Privacy Details</a>
            <a href="learn-more.html">Product Details</a>
        </div>
        <div class="header-right">
            <a href="https://app.atlaschurchsolutions.com/login" class="btn-login">Log In</a>
        </div>
    </nav>

    <div class="scrollable-content">
        
        <section class="form-container">
            <div class="atlas-form">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSemO0dJmsfPnNF7K7EtbD5YRFIHCZZIbdPaJgEkcjXpA589Ig/viewform?embedded=true" width="100%" height="2300" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-copyright">
                &copy; 2026 Atlas Church Solutions. All rights reserved.
            </div>
            <div class="footer-links">
                <a href="pricing.html">Pricing</a>
                <a href="about.html">About</a>
                <a href="legal.html">Privacy Policy</a>
                <a href="learn-more.html">Product Details</a>
                <a href="Contact-Us.html">Contact Us</a>
            </div>
        </footer>
    </div>

</body>
</html>
